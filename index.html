<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Games Info</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00bfff;
        }
        .game {
            border-bottom: 1px solid #333;
            padding: 10px 0;
        }
        .game img {
            width: 200px;
            border-radius: 8px;
        }
        .meta {
            color: #aaa;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>🎮 Games Info</h1>
    <div id="games"></div>

    <script type="module">
        import { GAMES_DATA } from "./data/games-data.js";

        const container = document.getElementById("games");

        GAMES_DATA.forEach(game => {
            const div = document.createElement("div");
            div.className = "game";
            div.innerHTML = `
                <h2>${game.title}</h2>
                <img src="${game.image}" alt="${game.title}">
                <p class="meta">Metacritic: ${game.metacritic} | Rating: ${game.rating}</p>
                <p>Disponível em: ${game.platforms.join(", ")}</p>
                <a href="${game.storeLink}" target="_blank">Ver na Epic Games</a>
            `;
            container.appendChild(div);
        });
    </script>
</body>
</html>
